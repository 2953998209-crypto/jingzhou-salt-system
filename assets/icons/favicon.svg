<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0a142d"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26c6da"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#2979ff"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- glow behind cube -->
  <ellipse cx="32" cy="36" rx="18" ry="10" fill="rgba(0,229,255,0.15)"/>
  <!-- salt crystal cube (isometric) -->
  <polygon points="32,12 46,20 32,28 18,20" fill="url(#cubeTop)" stroke="#b2ebf2" stroke-width="0.5"/>
  <polygon points="18,20 32,28 32,44 18,36" fill="url(#cubeLeft)" stroke="#4dd0e1" stroke-width="0.5"/>
  <polygon points="46,20 32,28 32,44 46,36" fill="url(#cubeRight)" stroke="#0097a7" stroke-width="0.5"/>
  <!-- digital grid lines on cube -->
  <line x1="25" y1="16" x2="25" y2="32" stroke="#00e5ff" stroke-width="0.3" opacity="0.5"/>
  <line x1="39" y1="16" x2="39" y2="32" stroke="#00e5ff" stroke-width="0.3" opacity="0.5"/>
  <line x1="22" y1="22" x2="42" y2="22" stroke="#00e5ff" stroke-width="0.3" opacity="0.4"/>
  <line x1="19" y1="26" x2="45" y2="26" stroke="#00e5ff" stroke-width="0.3" opacity="0.4"/>
  <!-- glow accent lines -->
  <line x1="32" y1="12" x2="32" y2="44" stroke="url(#glow)" stroke-width="0.8" opacity="0.7"/>
  <!-- outer glow ring -->
  <circle cx="32" cy="28" r="16" fill="none" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <circle cx="32" cy="28" r="14" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
</svg>
